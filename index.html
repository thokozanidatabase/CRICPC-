<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo/cripc1.png">

<title>CRIPC NEXUS</title>

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    overflow-x:hidden;
}

/* =========================
   APP LAYOUT
========================= */

.app{
    display:flex;
    height:100vh;
}

/* =========================
   SIDEBAR (DESKTOP)
========================= */
.sidebar{
    width:70px;
    background:#ffffff;
    border-right:1px solid #e8ddd1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px 0;
    gap:18px;
}

.icon{
    width:48px;
    height:48px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:14px;
    cursor:pointer;
    transition:all .3s ease;
}

.icon:hover{
    background:#f4ece4;
}

.icon.active{
    background:#efe2d4;
}

.material-symbols-rounded{
    font-size:28px;
    color:#6b4b36;   /* lighter version of #3c2315 */
    transition:.3s;
}

.icon:hover .material-symbols-rounded{
    color:#3c2315;
}

.icon.active .material-symbols-rounded{
    color:#3c2315;
}

/* =========================
   MAIN AREA
========================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* =========================
   TOPBAR
========================= */

.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 20px;
    background:#fff;
    border-bottom:1px solid #e6e6e6;
    position:sticky;
    top:0;
    z-index:10;
}

.search{
    flex:1;
    display:flex;
    justify-content:center;
}

.search input{
    width:60%;
    max-width:700px;
    padding:12px 18px;
    border-radius:25px;
    border:none;
    background:#efefef;
    outline:none;
}

/* =========================
   FEED (MASONRY)
========================= */

.feed{
    padding:20px;
    column-count:5;
    column-gap:15px;
}

/* responsive grid */
@media(max-width:1400px){ .feed{ column-count:4; } }
@media(max-width:1100px){ .feed{ column-count:3; } }
@media(max-width:800px){ .feed{ column-count:2; } }
@media(max-width:500px){ .feed{ column-count:1; } }

/* =========================
   CARD
========================= */

.card{
    background:#fff;
    margin-bottom:15px;
    border-radius:18px;
    overflow:hidden;
    position:relative;
    break-inside:avoid;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100%;
    display:block;
}

.save{
    position:absolute;
    top:10px;
    right:10px;
    background:#e60023;
    color:#fff;
    padding:8px 12px;
    border-radius:20px;
    font-size:12px;
    opacity:0;
    transition:0.3s;
}

.card:hover .save{
    opacity:1;
}

.caption{
    padding:10px;
    font-size:14px;
}

/* =========================
   MOBILE NAV (BOTTOM BAR)
========================= */

@media(max-width:768px){

    .app{
        flex-direction:column;
    }

    /* TOPBAR MOBILE */
    .search input{
        width:90%;
    }

    /* MOVE SIDEBAR TO BOTTOM */
    .sidebar{
        position:fixed;
        bottom:0;
        left:0;
        right:0;

        width:100%;
        height:60px;

        flex-direction:row;
        justify-content:space-around;
        align-items:center;

        border-right:none;
        border-top:1px solid #e6e6e6;

        z-index:1000;
    }

    .icon{
        width:45px;
        height:45px;
        font-size:18px;
    }

    /* prevent content hiding behind bottom nav */
    .main{
        padding-bottom:70px;
    }
}

</style>

</head>

<body>

<div class="app">

   <div class="sidebar">

    <div class="icon active" title="Home">
        <span class="material-symbols-rounded">home</span>
    </div>

    <div class="icon" title="Notifications">
        <span class="material-symbols-rounded">notifications</span>
    </div>

    <div class="icon" title="Upload">
        <span class="material-symbols-rounded">add_circle</span>
    </div>

    <div class="icon" title="Gallery">
        <span class="material-symbols-rounded">photo_library</span>
    </div>

    <div class="icon" title="Settings">
        <span class="material-symbols-rounded">settings</span>
    </div>

</div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="topbar">

            <strong>CRIPC</strong>

            <div class="search">
                <input type="text" placeholder="Search">
            </div>

            <div class="icon">👤</div>

        </div>

        <!-- FEED -->
        <div class="feed">

            <div class="card">
                <div class="save">Save</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Creative sketch artwork</div>
            </div>

            <div class="card">
                <div class="save">Save</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Dark textured background design</div>
            </div>

            <div class="card">
                <div class="save">Save</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Public speaker event photo</div>
            </div>

            <div class="card">
                <div class="save">Save</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Abstract digital art figure</div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
