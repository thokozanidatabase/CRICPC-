<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIPC NEXUS</title>

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f1eb;
    color:#3c2315;
    overflow-x:hidden;
}

/* =========================
   LAYOUT
========================= */

.container{
    display:flex;
    height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    width:240px;
    background:#693213;
    color:white;
    padding:30px;
    display:flex;
    flex-direction:column;
    transition:0.3s;
}

.logo img{
    width:150px;
    max-width:100%;
}

/* NAV */
.nav{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-top:20px;
}

.nav button{
    padding:15px;
    border:none;
    background:none;
    color:white;
    text-align:left;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.nav button:hover{
    background:#da9b42;
    color:#3c2315;
}

/* =========================
   HAMBURGER BUTTON
========================= */

.burger{
    display:none;
    font-size:28px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    margin-bottom:15px;
}

/* =========================
   MAIN
========================= */

.main{
    flex:1;
    overflow-y:auto;
}

.header{
    background:white;
    padding:25px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
}

.search-box input{
    width:300px;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* CONTENT */

.content{
    padding:30px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
}

.card img{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
}

/* HIDDEN */

.hidden{
    display:none;
}

/* =========================
   MOBILE MENU (BURGER)
========================= */

@media (max-width:768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        padding:15px;
        flex-direction:column;
    }

    .burger{
        display:block;
    }

    .nav{
        display:none;
        flex-direction:column;
        margin-top:10px;
    }

    .sidebar.active .nav{
        display:flex;
    }

    .nav button{
        text-align:center;
    }

    .header{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }

    .search-box input{
        width:100%;
    }
}

</style>

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

        <button class="burger" onclick="toggleMenu()">☰</button>

        <div class="logo">
            <img src="logo/cripc1.png" alt="Logo">
        </div>

        <nav class="nav">
            <button onclick="showSection('images')">Images</button>
            <button onclick="showSection('videos')">Videos</button>
            <button onclick="showSection('designs')">Designs</button>
            <button onclick="showSection('banners')">Banners</button>
        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="header">
            <h1>CRIPC NEXUS</h1>

            <div class="search-box">
                <input type="text" placeholder="Search...">
            </div>
        </header>

        <section class="content">

            <div id="images"></div>
            <div id="videos" class="hidden"></div>
            <div id="designs" class="hidden"></div>
            <div id="banners" class="hidden"></div>

        </section>

    </main>

</div>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
