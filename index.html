<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIPC NEXUS</title>

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f1eb;
    color:#3c2315;
    overflow-x:hidden;
}

/* =========================
   LAYOUT
========================= */

.container{
    display:flex;
    min-height:100vh;
}

/* =========================
   SIDEBAR (DESKTOP)
========================= */

.sidebar{
    width:240px;
    background:#693213;
    color:white;
    padding:20px;
    display:flex;
    flex-direction:column;
    transition:0.3s;
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:140px;
    max-width:100%;
    height:auto;
}

/* NAV */

.nav{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.nav button{
    padding:14px;
    border:none;
    background:none;
    color:white;
    text-align:left;
    border-radius:12px;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.nav button:hover{
    background:#da9b42;
    color:#3c2315;
}

/* =========================
   BURGER BUTTON
========================= */

.burger{
    display:none;
    font-size:28px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    margin-bottom:10px;
}

/* =========================
   MAIN
========================= */

.main{
    flex:1;
    overflow-y:auto;
}

.header{
    background:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:100;
    border-bottom:1px solid #e6d6c4;
}

.header h1{
    font-size:clamp(20px, 3vw, 38px);
}

.search-box input{
    width:280px;
    padding:12px 15px;
    border-radius:12px;
    border:1px solid #d8c1a5;
}

/* =========================
   CONTENT (PINTEREST STYLE)
========================= */

.content{
    padding:25px;
}

.grid{
    columns:4 250px;
    column-gap:18px;
}

/* CARD */

.card{
    background:white;
    border-radius:16px;
    margin-bottom:18px;
    overflow:hidden;
    break-inside:avoid;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    position:relative;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
}

.card img,
.card video{
    width:100%;
    display:block;
    border-radius:16px 16px 0 0;
}

/* DOWNLOAD BUTTON */

.download-btn{
    position:absolute;
    top:10px;
    right:10px;
    background:#da9b42;
    border:none;
    padding:8px 10px;
    border-radius:10px;
    font-size:12px;
    cursor:pointer;
    color:#3c2315;
    font-weight:bold;
    opacity:0;
    transition:0.3s;
}

.card:hover .download-btn{
    opacity:1;
}

/* =========================
   MOBILE DRAWER MENU
========================= */

.overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:50;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 768px){

    .container{
        flex-direction:column;
    }

    .burger{
        display:block;
    }

    .sidebar{
        position:fixed;
        left:-260px;
        top:0;
        height:100%;
        z-index:1000;
        width:240px;
    }

    .sidebar.active{
        left:0;
    }

    .overlay.active{
        display:block;
    }

    .header{
        padding:15px;
    }

    .search-box input{
        width:100%;
        margin-top:10px;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    .grid{
        columns:2 160px;
    }

    .logo img{
        width:110px;
    }
}

@media (max-width: 480px){

    .grid{
        columns:1;
    }

    .logo img{
        width:90px;
    }
}

</style>

</head>

<body>

<div class="overlay" onclick="toggleMenu()"></div>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

        <button class="burger" onclick="toggleMenu()">☰</button>

        <div class="logo">
            <img src="logo/cripc1.png" alt="Logo">
        </div>

        <nav class="nav">
            <button onclick="showSection('images')">Images</button>
            <button onclick="showSection('videos')">Videos</button>
            <button onclick="showSection('designs')">Designs</button>
            <button onclick="showSection('banners')">Banners</button>
        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="header">
            <button class="burger" style="color:#3c2315" onclick="toggleMenu()">☰</button>

            <h1>CRIPC NEXUS</h1>

            <div class="search-box">
                <input type="text" placeholder="Search...">
            </div>
        </header>

        <section class="content">

            <div id="images" class="grid">

                <div class="card">
                    <img src="img/sample1.jpg">
                    <button class="download-btn">Download</button>
                </div>

                <div class="card">
                    <img src="img/sample2.jpg">
                    <button class="download-btn">Download</button>
                </div>

            </div>

            <div id="videos" class="grid hidden">

                <div class="card">
                    <video src="videos/sample.mp4" controls></video>
                    <button class="download-btn">Download</button>
                </div>

            </div>

            <div id="designs" class="grid hidden"></div>
            <div id="banners" class="grid hidden"></div>

        </section>

    </main>

</div>

<script>

/* MENU TOGGLE */
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

/* DOWNLOAD FUNCTION */
document.querySelectorAll(".download-btn").forEach(btn=>{
    btn.addEventListener("click",function(){
        const file = this.parentElement.querySelector("img, video").src;
        const a = document.createElement("a");
        a.href = file;
        a.download = "CRIPC_MEDIA";
        a.click();
    });
});

</script>

</body>
</html>
