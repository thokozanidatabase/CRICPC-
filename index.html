<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRIPC NEXUS</title>

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    overflow-x:hidden;
}

/* =========================
   LAYOUT
========================= */

.app{
    display:flex;
    height:100vh;
}

/* =========================
   LEFT SIDEBAR (Pinterest style)
========================= */

.sidebar{
    width:70px;
    background:#ffffff;
    border-right:1px solid #e6e6e6;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px 0;
    gap:20px;
}

.sidebar img{
    width:35px;
    height:35px;
    border-radius:10px;
}

.icon{
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
    font-size:18px;
}

.icon:hover{
    background:#efefef;
}

/* =========================
   MAIN AREA
========================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* =========================
   TOP BAR
========================= */

.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 20px;
    background:#fff;
    border-bottom:1px solid #e6e6e6;
    position:sticky;
    top:0;
    z-index:10;
}

.search{
    flex:1;
    display:flex;
    justify-content:center;
}

.search input{
    width:60%;
    max-width:700px;
    padding:12px 18px;
    border-radius:25px;
    border:none;
    background:#efefef;
    outline:none;
}

/* =========================
   GRID (Pinterest masonry)
========================= */

.feed{
    padding:20px;
    column-count:5;
    column-gap:15px;
}

/* responsive columns */
@media(max-width:1400px){ .feed{ column-count:4; } }
@media(max-width:1100px){ .feed{ column-count:3; } }
@media(max-width:800px){ .feed{ column-count:2; } }
@media(max-width:500px){ .feed{ column-count:1; } }

/* =========================
   CARD
========================= */

.card{
    background:#fff;
    margin-bottom:15px;
    border-radius:18px;
    overflow:hidden;
    position:relative;
    break-inside:avoid;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

/* image */
.card img{
    width:100%;
    display:block;
}

/* hover save button */
.save{
    position:absolute;
    top:10px;
    right:10px;
    background:#e60023;
    color:#fff;
    padding:8px 12px;
    border-radius:20px;
    font-size:12px;
    opacity:0;
    transition:0.3s;
}

.card:hover .save{
    opacity:1;
}

/* caption */
.caption{
    padding:10px;
    font-size:14px;
    color:#333;
}

/* =========================
   MOBILE FIX
========================= */

@media(max-width:768px){

    .sidebar{
        width:60px;
    }

    .search input{
        width:90%;
    }
}

</style>

</head>

<body>

<div class="app">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">

        <div class="icon">🏠</div>
        <div class="icon">🔔</div>
        <div class="icon">➕</div>
        <div class="icon">📁</div>
        <div class="icon">⚙️</div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="topbar">

            <strong>CRIPC</strong>

            <div class="search">
                <input type="text" placeholder="Search">
            </div>

            <div class="icon">👤</div>

        </div>

        <!-- FEED -->
        <div class="feed">

            <div class="card">
                <div class="save">Save</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Creative sketch artwork</div>
            </div>

            <div class="card">
                <div class="save">Save</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Dark textured background design</div>
            </div>

            <div class="card">
                <div class="save">Save</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Public speaker event photo</div>
            </div>

            <div class="card">
                <div class="save">Save</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Abstract digital art figure</div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
