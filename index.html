<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRIPC NEXUS</title>

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    overflow-x:hidden;
}

/* =========================
   APP LAYOUT
========================= */

.app{
    display:flex;
    height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    width:70px;
    background:#ffffff;
    border-right:1px solid #e6e6e6;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px 0;
    gap:20px;
}

.icon{
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
    font-size:18px;
}

.icon:hover{
    background:#efefef;
}

/* =========================
   MAIN
========================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* =========================
   TOPBAR
========================= */

.topbar{
    position: sticky;
    top: 0;
    z-index: 999;

    display: flex;
    align-items: center;
    gap: 15px;

    padding: 10px 20px;

    background: #ffffff;
    transition: background 0.3s ease;
    border-bottom: 1px solid #e6e6e6;
}

.topbar.scrolled{
    background:#896742;
    border-bottom:none;
}

.topbar .logo img{
    height:38px;
}

.search{
    flex:1;
}

.search input{
    width:100%;
    max-width:500px;
    padding:10px 16px;
    border-radius:25px;
    border:none;
    background:#efefef;
    outline:none;
}

.topbar.scrolled .search input{
    background:rgba(255,255,255,0.15);
    color:#fff;
}

.topbar.scrolled .search input::placeholder{
    color:#ddd;
}

/* =========================
   FEED
========================= */

.feed{
    padding:20px;
    column-count:5;
    column-gap:15px;
}

@media(max-width:1400px){ .feed{ column-count:4; } }
@media(max-width:1100px){ .feed{ column-count:3; } }
@media(max-width:800px){ .feed{ column-count:2; } }
@media(max-width:500px){ .feed{ column-count:1; } }

/* =========================
   CARD
========================= */

.card{
    background:#fff;
    margin-bottom:15px;
    border-radius:18px;
    overflow:hidden;
    position:relative;
    break-inside:avoid;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100%;
    display:block;
}

.caption{
    padding:10px;
    font-size:14px;
}

/* DOWNLOAD BUTTON */
.download{
    position:absolute;
    top:10px;
    right:10px;

    background:#e60023;
    color:#fff;

    padding:8px 12px;
    border-radius:20px;
    font-size:12px;

    cursor:pointer;
    opacity:0;
    transition:0.3s;
}

.card:hover .download{
    opacity:1;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .app{
        flex-direction:column;
    }

    .sidebar{
        position:fixed;
        bottom:0;
        left:0;
        right:0;

        width:100%;
        height:60px;

        flex-direction:row;
        justify-content:space-around;
        align-items:center;

        border-top:1px solid #e6e6e6;
        border-right:none;

        z-index:1000;
    }

    .main{
        padding-bottom:70px;
    }
}

</style>

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="icon">🏠</div>
        <div class="icon">🔔</div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">

            <div class="logo">
                <img src="logo/cripc1.png" alt="CRIPC Logo">
            </div>

            <div class="search">
                <input type="text" placeholder="Search">
            </div>

        </div>

        <!-- FEED -->
        <div class="feed">

            <div class="card">
                <div class="download" onclick="downloadImage(this)">Download</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Creative sketch artwork</div>
            </div>

            <div class="card">
                <div class="download" onclick="downloadImage(this)">Download</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Dark textured background</div>
            </div>

            <div class="card">
                <div class="download" onclick="downloadImage(this)">Download</div>
                <img src="https://i.pinimg.com/736x/xx.jpg">
                <div class="caption">Public speaker event</div>
            </div>

        </div>

    </div>

</div>

<script>

/* TOPBAR SCROLL EFFECT */
window.addEventListener("scroll", function () {
    const topbar = document.querySelector(".topbar");
    if (window.scrollY > 10) {
        topbar.classList.add("scrolled");
    } else {
        topbar.classList.remove("scrolled");
    }
});

/* DOWNLOAD FUNCTION */
function downloadImage(btn) {
    const img = btn.parentElement.querySelector("img");
    const url = img.src;

    const a = document.createElement("a");
    a.href = url;
    a.download = "cripc-image.jpg";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

</script>

</body>
</html>
